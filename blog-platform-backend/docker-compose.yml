# docker-compose.yml
version: '3.9'

services:
  # ─── PostgreSQL ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: blog_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: blog_platform
    ports:
      - '5432:5432'          # localhost:5432 → container:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data   # data persists across restarts
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d blog_platform']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (for Phase 8 — BullMQ jobs) ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: blog_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

# ─── Named Volumes (data persists even if container is deleted) ──────────
volumes:
  postgres_data:
  redis_data: